<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>MTR English — Aprenda Inglês</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 120 100'><text y='.9em' font-size='90'>🦊</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #0B1622;
  --surface: #132035;
  --s2:      #1A2D45;
  --s3:      #0f1c2e;
  --gold:    #F5A623;
  --gold2:   #FFD27A;
  --green:   #2EC486;
  --green2:  #1a7a52;
  --red:     #E8463A;
  --red2:    #8a2020;
  --blue:    #3D8EFF;
  --purple:  #A78BFA;
  --text:    #F0F4FF;
  --muted:   #7B90B2;
  --radius:  16px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;user-select:none;}

/* ── SCREENS ── */
.screen{display:none;flex-direction:column;min-height:100vh;}
.screen.active{display:flex;}

/* ══════════════════════════════════════
   HOME SCREEN
══════════════════════════════════════ */
#s-home {
  background: var(--bg);
  padding-bottom: 88px;
}

.home-header {
  position: sticky; top: 0; z-index: 20;
  background: rgba(11,22,34,0.95);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  padding: 14px 20px;
  display: flex; align-items: center; justify-content: space-between;
}
.header-logo {
  display: flex; align-items: center; gap: 10px;
}
.header-fox { font-size: 24px; }
.header-title { font-family:'Syne',sans-serif; font-size: 18px; font-weight: 800; color: var(--text); }
.header-title span { color: var(--gold); }
.header-stats { display: flex; align-items: center; gap: 12px; }
.stat-pill {
  display: flex; align-items: center; gap: 5px;
  background: var(--s2); border-radius: 50px; padding: 6px 12px;
  font-size: 13px; font-weight: 700; color: var(--text);
}
.stat-pill .stat-icon { font-size: 14px; }
.stat-pill.streak { color: #FF8C42; }
.stat-pill.xp { color: var(--gold2); }

/* Path */
.path-container { padding: 24px 0 40px; }
.unit-block { margin-bottom: 8px; }
.unit-header {
  margin: 0 20px 20px;
  background: linear-gradient(135deg, var(--surface), var(--s2));
  border-radius: var(--radius);
  border: 1px solid rgba(255,255,255,0.07);
  padding: 16px 20px;
  display: flex; align-items: center; gap: 14px;
}
.unit-icon-wrap {
  width: 46px; height: 46px; border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; flex-shrink: 0;
}
.unit-text { flex: 1; }
.unit-num { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 2px; }
.unit-name { font-family:'Syne',sans-serif; font-size: 16px; font-weight: 800; color: var(--text); }
.unit-prog { font-size: 11px; color: var(--muted); margin-top: 2px; }

/* Lesson nodes */
.lessons-path {
  display: flex; flex-direction: column; align-items: center;
  gap: 0; padding: 0 20px;
  position: relative;
}
.path-node-wrap {
  display: flex; flex-direction: column; align-items: center;
  position: relative;
}
.path-connector {
  width: 3px; height: 28px;
  background: linear-gradient(to bottom, rgba(255,255,255,0.1), rgba(255,255,255,0.04));
  border-radius: 2px;
}
.path-node {
  width: 72px; height: 72px; border-radius: 50%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  cursor: pointer; position: relative;
  transition: transform 0.15s;
  border: 3px solid transparent;
  gap: 3px;
}
.path-node:active { transform: scale(0.93); }
.path-node .node-icon { font-size: 24px; line-height: 1; }
.path-node .node-num { font-size: 9px; font-weight: 800; letter-spacing: 0.5px; text-transform: uppercase; opacity: 0.8; }
.path-node.done {
  background: linear-gradient(135deg, var(--gold), #e8921a);
  border-color: rgba(255,255,255,0.2);
  box-shadow: 0 4px 20px rgba(245,166,35,0.35);
}
.path-node.done .node-icon::after { content:''; }
.path-node.current {
  background: linear-gradient(135deg, var(--blue), #2266cc);
  border-color: rgba(255,255,255,0.25);
  box-shadow: 0 4px 24px rgba(61,142,255,0.45);
  animation: nodePulse 2s ease-in-out infinite;
}
.path-node.locked {
  background: var(--s2);
  border-color: rgba(255,255,255,0.05);
  cursor: not-allowed; opacity: 0.5;
}
.path-node .stars-row {
  display: flex; gap: 2px; margin-top: 2px;
}
.path-node .star { font-size: 8px; }

@keyframes nodePulse {
  0%,100% { box-shadow: 0 4px 24px rgba(61,142,255,0.45); transform: scale(1); }
  50% { box-shadow: 0 4px 36px rgba(61,142,255,0.7); transform: scale(1.04); }
}

/* Zigzag path offsets */
.path-node-wrap:nth-child(3n+1) .path-node { margin-left: 50px; }
.path-node-wrap:nth-child(3n+2) .path-node { margin-left: 0; }
.path-node-wrap:nth-child(3n+3) .path-node { margin-left: -50px; }

/* ══════════════════════════════════════
   LESSON SCREEN
══════════════════════════════════════ */
#s-lesson {
  background: var(--bg);
}

.lesson-bar {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 16px;
  background: var(--surface);
  border-bottom: 1px solid rgba(255,255,255,0.05);
  flex-shrink: 0;
}
.btn-close-lesson {
  width: 34px; height: 34px; border-radius: 10px; background: var(--s2);
  border: none; color: var(--muted); font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  transition: background 0.15s;
}
.btn-close-lesson:active { background: var(--s3); }
.lesson-pbar-wrap { flex: 1; }
.lesson-pbar { height: 8px; background: var(--s2); border-radius: 8px; overflow: hidden; }
.lesson-pbar-fill {
  height: 100%; border-radius: 8px;
  background: linear-gradient(90deg, var(--gold), var(--gold2));
  transition: width 0.4s cubic-bezier(.4,0,.2,1);
  position: relative;
}
.lesson-pbar-fill::after {
  content: ''; position: absolute; right: 0; top: 0; bottom: 0; width: 8px;
  background: rgba(255,255,255,0.3); border-radius: 4px;
}
.hearts-display { display: flex; gap: 3px; flex-shrink: 0; }
.heart { font-size: 18px; transition: transform 0.3s; }
.heart.lost { filter: grayscale(1); opacity: 0.3; }
.heart.shake { animation: heartShake 0.5s ease; }
@keyframes heartShake {
  0%,100%{transform:scale(1)}25%{transform:scale(1.4) rotate(-10deg)}75%{transform:scale(0.9)}
}

.lesson-body {
  flex: 1; padding: 20px 18px; display: flex; flex-direction: column; gap: 18px;
  overflow-y: auto; padding-bottom: 200px;
}

/* Q type label */
.q-type-label {
  font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--muted);
}

/* Question card */
.q-card {
  background: var(--surface); border-radius: var(--radius);
  border: 1px solid rgba(255,255,255,0.06); padding: 20px;
}
.q-pt {
  font-family: 'Syne',sans-serif; font-size: clamp(20px,5vw,26px); font-weight: 800;
  color: var(--text); line-height: 1.2; text-align: center;
}
.q-hint { font-size: 12px; color: var(--muted); text-align: center; margin-top: 6px; }
.q-instruction { font-size: 14px; color: var(--muted); margin-bottom: 12px; }

/* Word Order: answer track */
.answer-track {
  min-height: 52px; border-radius: 12px;
  background: var(--s2); border: 2px dashed rgba(255,255,255,0.1);
  display: flex; flex-wrap: wrap; gap: 7px; padding: 10px 12px;
  align-items: center; transition: border-color 0.2s;
}
.answer-track.has-words { border-style: solid; border-color: rgba(61,142,255,0.3); }

/* Word pieces */
.piece {
  padding: 9px 14px; border-radius: 10px;
  font-family: 'Syne',sans-serif; font-size: 13px; font-weight: 800; letter-spacing: 0.3px;
  cursor: pointer; transition: transform 0.1s, opacity 0.15s;
  border: 2px solid;
}
.piece:active { transform: scale(0.91); }
.piece.type-wh   { background: rgba(61,142,255,0.12); border-color: rgba(61,142,255,0.4); color: #7bb8ff; }
.piece.type-tobe { background: rgba(245,166,35,0.12); border-color: rgba(245,166,35,0.4); color: var(--gold); }
.piece.type-aux  { background: rgba(245,166,35,0.12); border-color: rgba(245,166,35,0.4); color: var(--gold); }
.piece.type-subj { background: rgba(46,196,134,0.12); border-color: rgba(46,196,134,0.4); color: #5EE0A8; }
.piece.type-verb { background: rgba(167,139,250,0.12); border-color: rgba(167,139,250,0.4); color: #c4aeff; }
.piece.type-neu  { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.15); color: var(--text); }
.piece.placed { background: var(--s2); border-color: rgba(255,255,255,0.15); color: var(--text); }
.piece.gone { opacity: 0; pointer-events: none; width: 0; padding: 0; border: none; margin: 0; overflow: hidden; }

.word-bank {
  display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
  padding: 14px; background: var(--surface); border-radius: var(--radius);
  border: 1px solid rgba(255,255,255,0.05); min-height: 72px;
}

/* Multiple choice options */
.mc-options { display: flex; flex-direction: column; gap: 10px; }
.mc-option {
  padding: 16px 18px; border-radius: 14px; cursor: pointer;
  background: var(--surface); border: 2px solid rgba(255,255,255,0.1);
  font-family: 'DM Sans',sans-serif; font-size: 14px; font-weight: 600; color: var(--text);
  transition: all 0.15s; text-align: left; width: 100%;
  display: flex; align-items: center; gap: 12px;
}
.mc-option:active { transform: scale(0.98); }
.mc-option.selected { border-color: var(--blue); background: rgba(61,142,255,0.1); color: #7bb8ff; }
.mc-option.correct-opt { border-color: var(--green); background: rgba(46,196,134,0.12); color: var(--green); }
.mc-option.wrong-opt { border-color: var(--red); background: rgba(232,70,58,0.12); color: var(--red); }
.mc-option .opt-letter {
  width: 28px; height: 28px; border-radius: 8px; flex-shrink: 0;
  background: var(--s2); display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 800; color: var(--muted);
}
.mc-option.selected .opt-letter { background: rgba(61,142,255,0.2); color: var(--blue); }

/* Fill blank */
.blank-sentence {
  font-family: 'Syne',sans-serif; font-size: clamp(18px,4.5vw,24px); font-weight: 800;
  color: var(--text); text-align: center; line-height: 1.4; padding: 16px 0 8px;
}
.blank-word { color: var(--gold); border-bottom: 3px solid var(--gold); padding: 0 4px; }
.blank-placeholder {
  display: inline-block; width: 80px; height: 28px;
  border-bottom: 3px solid var(--muted); margin: 0 6px; vertical-align: bottom;
}
.fill-options { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
.fill-btn {
  padding: 12px 20px; border-radius: 12px; cursor: pointer;
  background: var(--surface); border: 2px solid rgba(255,255,255,0.12);
  font-family: 'Syne',sans-serif; font-size: 15px; font-weight: 800; color: var(--text);
  transition: all 0.15s; min-width: 80px;
}
.fill-btn:active { transform: scale(0.95); }
.fill-btn.selected { border-color: var(--blue); background: rgba(61,142,255,0.1); color: #7bb8ff; }
.fill-btn.correct-opt { border-color: var(--green); background: rgba(46,196,134,0.12); color: var(--green); }
.fill-btn.wrong-opt { border-color: var(--red); background: rgba(232,70,58,0.12); color: var(--red); }

/* Meaning match */
.meaning-word-display {
  font-family: 'Syne',sans-serif; font-size: 36px; font-weight: 800;
  color: var(--gold); text-align: center; padding: 20px 0 10px;
  letter-spacing: 1px;
}
.meaning-sub { font-size: 12px; color: var(--muted); text-align: center; margin-bottom: 6px; }

/* ── CHECK BUTTON ── */
.check-btn-wrap {
  position: fixed; bottom: 0; left: 0; right: 0;
  padding: 12px 18px 24px;
  background: transparent;
  z-index: 30;
  pointer-events: none;
}
.btn-check {
  width: 100%; padding: 16px; border: none; border-radius: 14px;
  font-family: 'DM Sans',sans-serif; font-size: 16px; font-weight: 800;
  cursor: pointer; transition: all 0.15s; pointer-events: all;
  background: var(--gold); color: #000;
}
.btn-check:disabled { opacity: 0.3; cursor: not-allowed; background: var(--s2); color: var(--muted); }
.btn-check:not(:disabled):active { transform: scale(0.98); }

/* ── FEEDBACK SHEET ── */
.feedback-sheet {
  position: fixed; bottom: 0; left: 0; right: 0;
  border-radius: 24px 24px 0 0;
  padding: 20px 18px 32px;
  z-index: 40;
  transform: translateY(100%);
  transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
}
.feedback-sheet.visible { transform: translateY(0); }
.feedback-sheet.correct { background: var(--green2); border-top: 3px solid var(--green); }
.feedback-sheet.wrong { background: var(--red2); border-top: 3px solid var(--red); }
.fb-title { font-family:'Syne',sans-serif; font-size: 20px; font-weight: 800; margin-bottom: 6px; }
.feedback-sheet.correct .fb-title { color: var(--green); }
.feedback-sheet.wrong .fb-title { color: var(--red); }
.fb-body { font-size: 13px; line-height: 1.6; color: rgba(240,244,255,0.8); margin-bottom: 16px; }
.fb-body strong { color: var(--text); }
.btn-continue {
  width: 100%; padding: 15px; border: none; border-radius: 14px;
  font-family: 'DM Sans',sans-serif; font-size: 15px; font-weight: 800; cursor: pointer;
}
.feedback-sheet.correct .btn-continue { background: var(--green); color: #000; }
.feedback-sheet.wrong .btn-continue { background: var(--red); color: #fff; }

/* ══════════════════════════════════════
   RESULT SCREEN
══════════════════════════════════════ */
#s-result {
  background: linear-gradient(160deg,#0f2040 0%,var(--bg) 60%);
  align-items: center; justify-content: center; padding: 32px 20px;
}
.result-card {
  background: var(--surface); border-radius: 24px;
  border: 1px solid rgba(255,255,255,0.08);
  padding: 36px 24px; max-width: 420px; width: 100%; text-align: center;
  animation: popIn 0.45s cubic-bezier(0.175,0.885,0.32,1.275);
}
.result-emoji { font-size: 60px; display: block; margin-bottom: 12px; animation: bob 2s ease-in-out infinite; }
.result-title { font-family:'Syne',sans-serif; font-size: 26px; font-weight: 800; color: var(--text); margin-bottom: 4px; }
.result-sub { font-size: 13px; color: var(--muted); margin-bottom: 24px; }
.result-stats { display: flex; gap: 12px; margin-bottom: 24px; }
.result-stat {
  flex: 1; background: var(--s2); border-radius: 14px; padding: 16px 10px;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
}
.result-stat .rs-icon { font-size: 24px; }
.result-stat .rs-val { font-family:'Syne',sans-serif; font-size: 22px; font-weight: 800; color: var(--text); }
.result-stat .rs-label { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); }
.result-acts { display: flex; gap: 10px; }
.btn-r { flex: 1; border: none; border-radius: 14px; padding: 14px; font-family:'DM Sans',sans-serif; font-weight: 800; font-size: 14px; cursor: pointer; transition: transform 0.12s; }
.btn-r:active { transform: scale(0.97); }
.btn-r.pri { background: var(--gold); color: #000; }
.btn-r.sec { background: var(--s2); color: var(--text); border: 1px solid rgba(255,255,255,0.08); }

/* ══════════════════════════════════════
   FAIL SCREEN (no hearts)
══════════════════════════════════════ */
#s-fail {
  background: linear-gradient(160deg,#200f0f 0%,var(--bg) 60%);
  align-items: center; justify-content: center; padding: 32px 20px;
}

/* ══════════════════════════════════════
   CONFETTI
══════════════════════════════════════ */
.confetti-container {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none; z-index: 100; overflow: hidden;
}
.confetti-piece {
  position: absolute; width: 10px; height: 10px; border-radius: 2px;
  animation: confettiFall linear forwards;
}
@keyframes confettiFall {
  0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
}

/* ══════════════════════════════════════
   ANIMATIONS
══════════════════════════════════════ */
@keyframes popIn { from{opacity:0;transform:scale(0.75)} to{opacity:1;transform:scale(1)} }
@keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
@keyframes fadeInUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
.fade-in { animation: fadeInUp 0.3s ease forwards; }

/* Dev bar */
.dev-bar {
  position: fixed; bottom: 0; left: 0; right: 0; height: 20px;
  background: rgba(11,22,34,0.96); border-top: 1px solid rgba(61,142,255,0.12);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; color: rgba(61,142,255,0.35); font-family:'DM Sans',sans-serif;
  letter-spacing: 0.3px; z-index: 200;
}
.dev-bar a { color: rgba(61,142,255,0.45); text-decoration: none; }
</style>
</head>
<body>

<!-- CONFETTI CONTAINER -->
<div class="confetti-container" id="confetti-container"></div>

<!-- ══════════ HOME SCREEN ══════════ -->
<div class="screen active" id="s-home">
  <div class="home-header">
    <div class="header-logo">
      <span class="header-fox">🦊</span>
      <span class="header-title">MTR <span>English</span></span>
    </div>
    <div class="header-stats">
      <div class="stat-pill streak"><span class="stat-icon">🔥</span><span id="stat-streak">0</span></div>
      <div class="stat-pill xp"><span class="stat-icon">⭐</span><span id="stat-xp">0</span></div>
    </div>
  </div>
  <div class="path-container" id="path-container">
    <!-- Injected by JS -->
  </div>
</div>

<!-- ══════════ LESSON SCREEN ══════════ -->
<div class="screen" id="s-lesson">
  <div class="lesson-bar">
    <button class="btn-close-lesson" onclick="confirmCloseLesson()">✕</button>
    <div class="lesson-pbar-wrap">
      <div class="lesson-pbar"><div class="lesson-pbar-fill" id="lesson-pbar-fill" style="width:0%"></div></div>
    </div>
    <div class="hearts-display" id="hearts-display">
      <span class="heart" id="h1">❤️</span>
      <span class="heart" id="h2">❤️</span>
      <span class="heart" id="h3">❤️</span>
      <span class="heart" id="h4">❤️</span>
      <span class="heart" id="h5">❤️</span>
    </div>
  </div>
  <div class="lesson-body" id="lesson-body"></div>
  <div class="check-btn-wrap">
    <button class="btn-check" id="btn-check" disabled onclick="checkAnswer()">Verificar</button>
  </div>
  <div class="feedback-sheet" id="feedback-sheet">
    <div class="fb-title" id="fb-title"></div>
    <div class="fb-body" id="fb-body"></div>
    <button class="btn-continue" onclick="continueLesson()">Continuar</button>
  </div>
</div>

<!-- ══════════ RESULT SCREEN ══════════ -->
<div class="screen" id="s-result">
  <div class="result-card">
    <span class="result-emoji" id="r-emoji">🎉</span>
    <h2 class="result-title" id="r-title">Lição Completa!</h2>
    <p class="result-sub" id="r-sub"></p>
    <div class="result-stats">
      <div class="result-stat">
        <span class="rs-icon">⭐</span>
        <span class="rs-val" id="r-xp">0</span>
        <span class="rs-label">XP Ganho</span>
      </div>
      <div class="result-stat">
        <span class="rs-icon">❤️</span>
        <span class="rs-val" id="r-hearts">5</span>
        <span class="rs-label">Vidas</span>
      </div>
      <div class="result-stat">
        <span class="rs-icon">✓</span>
        <span class="rs-val" id="r-acc">0%</span>
        <span class="rs-label">Acerto</span>
      </div>
    </div>
    <div class="result-acts">
      <button class="btn-r sec" id="btn-retry-lesson" onclick="retryCurrentLesson()">🔄 Repetir</button>
      <button class="btn-r pri" onclick="goHome()">🏠 Início</button>
    </div>
  </div>
</div>

<!-- ══════════ FAIL SCREEN ══════════ -->
<div class="screen" id="s-fail">
  <div class="result-card">
    <span class="result-emoji" style="animation:none">💔</span>
    <h2 class="result-title">Sem Vidas!</h2>
    <p class="result-sub">Não tem problema — praticar é aprender!</p>
    <div class="result-acts" style="margin-top:24px">
      <button class="btn-r sec" onclick="retryCurrentLesson()">🔄 Tentar de Novo</button>

// ══════════════════════════════════════════
//  STREAK CHECK
// ══════════════════════════════════════════
function checkStreak(){
  const today = new Date().toDateString();
  if(lastDate !== today){
    const yesterday = new Date(Date.now()-86400000).toDateString();
    if(lastDate === yesterday){ streak++; }
    else if(lastDate !== today){ streak = lastDate ? 0 : streak; }
    lastDate = today;
    localStorage.setItem('mtr_date', today);
    localStorage.setItem('mtr_streak', streak);
  }
}

function saveProgress(){
  localStorage.setItem('mtr_progress', JSON.stringify(progress));
  localStorage.setItem('mtr_xp', totalXP);
  localStorage.setItem('mtr_streak', streak);
}

// ══════════════════════════════════════════
//  RENDER HOME PATH
// ══════════════════════════════════════════
function isUnitUnlocked(unitId){
  if(unitId === 'u1') return true;
  const units = ['u1','u2','u3'];
  const idx = units.indexOf(unitId);
  if(idx <= 0) return true;
  const prevUnit = UNITS[idx-1];
  return prevUnit.lessons.every(lid => progress[lid]?.done);
}

function getLessonState(lid){
  const unit = UNITS.find(u => u.lessons.includes(lid));
  if(!unit) return 'locked';
  if(!isUnitUnlocked(unit.id)) return 'locked';
  if(progress[lid]?.done) return 'done';
  // Check if previous lesson in same unit is done (or it's the first)
  const uidx = unit.lessons.indexOf(lid);
  if(uidx === 0) return isUnitUnlocked(unit.id) ? 'current' : 'locked';
  const prev = unit.lessons[uidx-1];
  return progress[prev]?.done ? 'current' : 'locked';
}

function getLessonIcon(lid){
  const state = getLessonState(lid);
  if(state === 'done') return '✓';
  if(state === 'locked') return '🔒';
  return LESSONS[lid]?.icon || '●';
}

function renderPath(){
  const container = document.getElementById('path-container');
  let html = '';

  UNITS.forEach(unit => {
    const unlocked = isUnitUnlocked(unit.id);
    const doneCount = unit.lessons.filter(lid => progress[lid]?.done).length;
    html += `
      <div class="unit-block">
        <div class="unit-header" style="border-left:3px solid ${unit.color}; opacity:${unlocked?1:0.5}">
          <div class="unit-icon-wrap" style="background:${unit.bg}">${unit.icon}</div>
          <div class="unit-text">
            <div class="unit-num">Unidade ${unit.num}</div>
            <div class="unit-name">${unit.name}</div>
            <div class="unit-prog">${doneCount}/${unit.lessons.length} lições completas</div>
          </div>
        </div>
        <div class="lessons-path">`;

    unit.lessons.forEach((lid, i) => {
      const state = getLessonState(lid);
      const lesson = LESSONS[lid];
      const stars = progress[lid]?.stars || 0;
      const starsHtml = [1,2,3].map(s => `<span class="star">${s<=stars?'⭐':'☆'}</span>`).join('');

      if(i > 0) html += `<div class="path-connector"></div>`;
      html += `
        <div class="path-node-wrap">
          <div class="path-node ${state}" onclick="onNodeClick('${lid}')">
            <span class="node-icon">${getLessonIcon(lid)}</span>
            <span class="node-num">${lesson?.title?.split(' ')[0] || ''}</span>
            <div class="stars-row">${starsHtml}</div>
          </div>
        </div>`;
    });

    html += `</div></div>`;
  });

  container.innerHTML = html;
}

function onNodeClick(lid){
  const state = getLessonState(lid);
  if(state === 'locked'){
    // shake
    return;
  }
  startLesson(lid);
}

// ══════════════════════════════════════════
//  UPDATE HEADER STATS
// ══════════════════════════════════════════
function updateHeaderStats(){
  document.getElementById('stat-streak').textContent = streak;
  document.getElementById('stat-xp').textContent = totalXP;
}

// ══════════════════════════════════════════
//  START LESSON
// ══════════════════════════════════════════
function startLesson(lid){
  currentLessonId = lid;
  currentLesson = LESSONS[lid];
  qIdx = 0;
  hearts = 5;
  sessionXP = 0;
  correctQ = 0;
  totalQ = currentLesson.questions.length;
  checked = false;
  selectedAnswer = null;
  placedWords = [];
  feedbackVisible = false;

  updateHearts();
  showScreen('s-lesson');
  renderQuestion();
}

function retryCurrentLesson(){
  startLesson(currentLessonId);
}

// ══════════════════════════════════════════
//  RENDER QUESTION
// ══════════════════════════════════════════
function renderQuestion(){
  checked = false;
  selectedAnswer = null;
  placedWords = [];
  feedbackVisible = false;

  const q = currentLesson.questions[qIdx];
  const pct = (qIdx / totalQ) * 100;
  document.getElementById('lesson-pbar-fill').style.width = pct + '%';

  document.getElementById('btn-check').disabled = true;
  document.getElementById('btn-check').textContent = 'Verificar';

  // Hide feedback
  const sheet = document.getElementById('feedback-sheet');
  sheet.classList.remove('visible','correct','wrong');

  const body = document.getElementById('lesson-body');

  if(q.type === 'word_order') renderWordOrder(q, body);
  else if(q.type === 'multiple_choice') renderMultipleChoice(q, body);
  else if(q.type === 'fill_blank') renderFillBlank(q, body);
  else if(q.type === 'meaning') renderMeaning(q, body);
}

// ── WORD ORDER ──
function renderWordOrder(q, body){
  const typeLabel = getTypeLabel('word_order');
  body.innerHTML = `
    <div class="q-type-label fade-in">${typeLabel}</div>
    <div class="q-card fade-in">
      <div class="q-pt">${q.pt}</div>
      ${q.hint ? `<div class="q-hint">💡 ${q.hint}</div>` : ''}
    </div>
    <div>
      <div class="bank-label" style="font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;">Sua resposta</div>
      <div class="answer-track" id="answer-track" onclick=""></div>
    </div>
    <div>
      <div class="bank-label" style="font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;">Palavras disponíveis</div>
      <div class="word-bank" id="word-bank">
        ${shuffleArr([...q.pieces]).map(w =>
          `<div class="piece type-${pieceType(w)}" id="piece-${w.replace(/ /g,'_')}" onclick="addWord('${w.replace(/ /g,'_')}')">${w}</div>`
        ).join('')}
      </div>
    </div>`;
}

function addWord(wKey){
  if(checked) return;
  const w = wKey.replace(/_/g,' ');
  const el = document.getElementById(`piece-${wKey}`);
  if(!el || el.classList.contains('gone')) return;
  el.classList.add('gone');
  placedWords.push(w);
  updateAnswerTrack();
  checkWordOrderReady();
}

function removeWord(idx){
  if(checked) return;
  const w = placedWords[idx];
  placedWords.splice(idx,1);
  const wKey = w.replace(/ /g,'_');
  const el = document.getElementById(`piece-${wKey}`);
  if(el) el.classList.remove('gone');
  updateAnswerTrack();
  checkWordOrderReady();
}

function updateAnswerTrack(){
  const track = document.getElementById('answer-track');
  if(!track) return;
  track.classList.toggle('has-words', placedWords.length > 0);
  track.innerHTML = placedWords.map((w,i) =>
    `<div class="piece placed" onclick="removeWord(${i})">${w}</div>`
  ).join('');
  if(placedWords.length === 0){
    track.innerHTML = '<span style="color:var(--muted);font-size:13px">Toque nas palavras abaixo...</span>';
  }
}

function checkWordOrderReady(){
  const q = currentLesson.questions[qIdx];
  document.getElementById('btn-check').disabled = placedWords.length === 0;
}

// ── MULTIPLE CHOICE ──
function renderMultipleChoice(q, body){
  const letters = ['A','B','C','D'];
  body.innerHTML = `
    <div class="q-type-label fade-in">${getTypeLabel('multiple_choice')}</div>
    <div class="q-card fade-in">
      <div class="q-pt">${q.question}</div>
    </div>
    <div class="mc-options fade-in">
      ${q.options.map((opt, i) => `
        <button class="mc-option" id="mc-${i}" onclick="selectMC(${i})">
          <div class="opt-letter">${letters[i]}</div>
          <span>${opt}</span>
        </button>`).join('')}
    </div>`;
}

function selectMC(i){
  if(checked) return;
  document.querySelectorAll('.mc-option').forEach(el => el.classList.remove('selected'));
  document.getElementById(`mc-${i}`).classList.add('selected');
  selectedAnswer = i;
  document.getElementById('btn-check').disabled = false;
}

// ── FILL BLANK ──
function renderFillBlank(q, body){
  const sentenceHtml = q.sentence.replace('___', '<span class="blank-placeholder" id="blank-display"></span>');
  body.innerHTML = `
    <div class="q-type-label fade-in">${getTypeLabel('fill_blank')}</div>
    <div class="q-card fade-in">
      <div class="blank-sentence">${sentenceHtml}</div>
      <div class="q-hint" style="margin-top:8px">${q.pt}</div>
    </div>
    <div class="fill-options fade-in">
      ${q.options.map((opt,i) =>
        `<button class="fill-btn" id="fill-${i}" onclick="selectFill(${i})">${opt}</button>`
      ).join('')}
    </div>`;
}

function selectFill(i){
  if(checked) return;
  document.querySelectorAll('.fill-btn').forEach(el => el.classList.remove('selected'));
  document.getElementById(`fill-${i}`).classList.add('selected');
  selectedAnswer = i;
  // Update blank display
  const q = currentLesson.questions[qIdx];
  const blank = document.getElementById('blank-display');
  if(blank){
    blank.outerHTML = `<span class="blank-word" id="blank-display">${q.options[i]}</span>`;
  }
  document.getElementById('btn-check').disabled = false;
}

// ── MEANING ──
function renderMeaning(q, body){
  body.innerHTML = `
    <div class="q-type-label fade-in">${getTypeLabel('meaning')}</div>
    <div class="q-card fade-in">
      <div class="meaning-word-display">${q.word}</div>
      <div class="meaning-sub">${q.category}</div>
      <div class="q-hint">Selecione o significado correto</div>
    </div>
    <div class="mc-options fade-in">
      ${q.options.map((opt, i) => `
        <button class="mc-option" id="mc-${i}" onclick="selectMC(${i})">
          <div class="opt-letter">${i+1}</div>
          <span>${opt}</span>
        </button>`).join('')}
    </div>`;
}

// ── HELPERS ──
function getTypeLabel(t){
  const labels = {
    word_order: '🧩 Monte a Frase',
    multiple_choice: '🎯 Escolha a Tradução',
    fill_blank: '✏️ Complete a Lacuna',
    meaning: '🔤 Qual o Significado?'
  };
  return labels[t] || t;
}

function shuffleArr(arr){
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

// ══════════════════════════════════════════
//  CHECK ANSWER
// ══════════════════════════════════════════
function checkAnswer(){
  if(checked || feedbackVisible) return;
  checked = true;
  const q = currentLesson.questions[qIdx];
  let correct = false;

  if(q.type === 'word_order'){
    correct = placedWords.join(' ') === q.answer.join(' ');
    // Highlight answer track
    const track = document.getElementById('answer-track');
    if(track) track.style.borderColor = correct ? 'var(--green)' : 'var(--red)';
  } else if(q.type === 'multiple_choice' || q.type === 'meaning'){
    correct = selectedAnswer === q.answer;
    const letters = ['A','B','C','D'];
    document.querySelectorAll('.mc-option').forEach((el,i) => {
      el.classList.remove('selected');
      if(i === q.answer) el.classList.add('correct-opt');
      else if(i === selectedAnswer && !correct) el.classList.add('wrong-opt');
    });
  } else if(q.type === 'fill_blank'){
    correct = selectedAnswer === q.answer;
    document.querySelectorAll('.fill-btn').forEach((el,i) => {
      el.classList.remove('selected');
      if(i === q.answer) el.classList.add('correct-opt');
      else if(i === selectedAnswer && !correct) el.classList.add('wrong-opt');
    });
  }

  if(correct){
    correctQ++;
    sessionXP += currentLesson.xpPer;
    showFeedback(true, '✓ Correto!', q.feedback || '');
  } else {
    hearts--;
    updateHearts();
    const correctStr = q.type === 'word_order' ? q.answer.join(' ') :
                       (q.type === 'multiple_choice' || q.type === 'meaning') ? q.options[q.answer] :
                       q.options[q.answer];
    showFeedback(false, '✗ Errado!',
      `Resposta correta: <strong>${correctStr}</strong><br>${q.feedback || ''}`);
  }
}

// ══════════════════════════════════════════
//  FEEDBACK
// ══════════════════════════════════════════
function showFeedback(correct, title, body){
  feedbackVisible = true;
  const sheet = document.getElementById('feedback-sheet');
  sheet.classList.remove('correct','wrong');
  sheet.classList.add(correct ? 'correct' : 'wrong');
  document.getElementById('fb-title').textContent = title;
  document.getElementById('fb-body').innerHTML = body;
  document.getElementById('btn-check').style.display = 'none';
  sheet.classList.add('visible');
}

function continueLesson(){
  feedbackVisible = false;
  document.getElementById('feedback-sheet').classList.remove('visible');
  document.getElementById('btn-check').style.display = 'block';

  if(hearts <= 0){
    setTimeout(() => showScreen('s-fail'), 200);
    return;
  }

  qIdx++;
  if(qIdx >= totalQ){
    finishLesson();
  } else {
    renderQuestion();
  }
}

// ══════════════════════════════════════════
//  UPDATE HEARTS
// ══════════════════════════════════════════
function updateHearts(){
  for(let i=1;i<=5;i++){
    const el = document.getElementById(`h${i}`);
    if(!el) continue;
    if(i <= hearts){
      el.classList.remove('lost');
    } else {
      if(!el.classList.contains('lost')){
        el.classList.add('shake');
        setTimeout(()=>el.classList.remove('shake'), 600);
      }
      el.classList.add('lost');
    }
  }
}

// ══════════════════════════════════════════
//  FINISH LESSON
// ══════════════════════════════════════════
function finishLesson(){
  // Calculate stars
  const acc = correctQ / totalQ;
  const stars = acc >= 0.9 ? 3 : acc >= 0.6 ? 2 : 1;

  // Mark lesson done
  const existing = progress[currentLessonId] || {};
  progress[currentLessonId] = {
    done: true,
    stars: Math.max(stars, existing.stars || 0),
    bestXP: Math.max(sessionXP, existing.bestXP || 0)
  };

  // Add XP
  totalXP += sessionXP;

  // Update streak
  checkStreak();
  streak = parseInt(localStorage.getItem('mtr_streak')||'0') + 1;
  localStorage.setItem('mtr_streak', streak);

  saveProgress();

  // Result screen
  const emojis = ['🌱','🙂','😊','🎉','🏆'];
  const ei = Math.min(stars + (acc >= 0.9 ? 1 : 0), 4);
  document.getElementById('r-emoji').textContent = emojis[Math.min(stars+1, 4)];
  document.getElementById('r-title').textContent = stars===3?'Perfeito! 🏆':stars===2?'Muito Bem! 🎉':'Continue assim! 💪';
  document.getElementById('r-sub').textContent = `${currentLesson.title} — ${stars} ⭐`;
  document.getElementById('r-xp').textContent = '+' + sessionXP;
  document.getElementById('r-hearts').textContent = hearts;
  document.getElementById('r-acc').textContent = Math.round(acc*100) + '%';

  showScreen('s-result');
  if(stars >= 2) spawnConfetti();
  updateHeaderStats();
}

// ══════════════════════════════════════════
//  CONFETTI
// ══════════════════════════════════════════
function spawnConfetti(){
  const container = document.getElementById('confetti-container');
  const colors = ['#F5A623','#2EC486','#3D8EFF','#A78BFA','#FFD27A','#E8463A'];
  for(let i=0;i<60;i++){
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.left = Math.random()*100 + 'vw';
    el.style.background = colors[Math.floor(Math.random()*colors.length)];
    el.style.width = (6 + Math.random()*8) + 'px';
    el.style.height = (6 + Math.random()*8) + 'px';
    el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    el.style.animationDuration = (1.5 + Math.random()*2) + 's';
    el.style.animationDelay = (Math.random()*0.8) + 's';
    container.appendChild(el);
    setTimeout(() => el.remove(), 3500);
  }
}

// ══════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════
checkStreak();
updateHeaderStats();
renderPath();
</script>
